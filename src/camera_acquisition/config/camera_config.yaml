# 相机配置文件

# 相机类型配置
camera:
  type: "realsense"
  model: "D435"

# 数据流配置
streams:
  # 彩色图像流
  color:
    width: 640
    height: 480
    fps: 30
    format: "bgr8"

  # 深度图像流
  depth:
    width: 640
    height: 480
    fps: 30
    format: "z16"
    scale_factor: 0.001  # 毫米转米

# 标定配置
calibration:
  board_size: "8x6"
  square_size: 0.024  # 米
  min_images: 15
  use_opencv: true

# 手眼变换（从手眼标定模块获取）
hand_eye_transform:
  parent_frame: "end_effector"
  child_frame: "camera_link"
  translation: [0.0, 0.0, 0.1]  # 标定后需要更新
  rotation: [0.0, 0.0, 0.0, 1.0]  # 标定后需要更新
