# 视觉跟随协调器配置文件

# 坐标系配置
frames:
  camera_frame: 'camera_depth_optical_frame'  # 相机坐标系
  base_frame: 'base_link'                     # 机器人基座坐标系

# 控制参数
control:
  min_confidence: 0.5                         # 最小检测置信度
  target_offset_z: 0.1                        # 目标上方偏移（米）
  planning_time: 5.0                          # 规划时间（秒）
  max_velocity_scaling: 0.3                   # 最大速度缩放
  max_acceleration_scaling: 0.3               # 最大加速度缩放

# MoveIt2 配置
moveit:
  group_name: 'arm'                           # 规划组名称
  end_effector_link: 'end_effector'           # 末端执行器链接名称

# ROS2 话题配置
topics:
  input_detections: '/perception/detections'  # 输入检测结果话题
