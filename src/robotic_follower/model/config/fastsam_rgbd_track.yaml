segmenter:
  type: fastsam
  model_path: FastSAM-s.pt
  conf_threshold: 0.25
  iou_threshold: 0.45
  min_mask_area_px: 400
  fallback_open_kernel: 5
  fallback_open_iterations: 1
  person_model_path: yolov8n-seg.pt

params:
  depth_valid_ratio_min: 0.6
  mask_area_min_px: 400
  z_trim_quantile: 0.05
  table_z: 0.0
  table_margin_m: 0.01
  table_reestimate_interval_s: 2.0
  table_reestimate_min_inlier_ratio: 0.35
  tf_stale_threshold_ms: 80
  sync_skew_threshold_ms: 30
  tf_fallback_warn_every: 45
  table_warn_every: 45
  sync_warn_every: 45
  association_dist_gate_m: 0.08
  detection_merge_dist_m: 0.06
  detection_merge_iou_min: 0.48
  duplicate_track_dist_m: 0.04
  max_non_person_distance_m: 1.2
  fallback_to_source_frame_when_tf_disconnected: true
  max_age: 8
  min_hits: 3
  occlusion_ratio_max_for_grasp: 0.45
