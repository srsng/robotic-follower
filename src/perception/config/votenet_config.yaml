# 感知系统配置文件 - VoteNet 模型

# 点云滤波配置
filtering:
  voxel_size: 0.04
  statistical_nb_neighbors: 100
  statistical_std_ratio: 2.0
  # passthrough_axis: 'z'
  # passthrough_min: 0.3
  # passthrough_max: 2.0

# 密度计算配置
density:
  bandwidth: 0.05
  kernel: 'gaussian'
  use_inverse: true

# 3D 检测器配置 - VoteNet
detector:
  type: 'standard'
  config_file: './src/perception/models/votenet/votenet_8xb16_sunrgbd-3d.py.py'
  checkpoint_file: './src/perception/models/votenet/votenet_16x8_sunrgbd-3d-10class_20210820_162823-bf11f014.pth'
  device: 'cuda:0'
  score_threshold: 0.3
  use_density_fusion: false

# ROS2 话题配置
topics:
  depth_image: '/camera/aligned_depth_to_color/image_raw'
  camera_info: '/camera/color/camera_info'
  output_pointcloud: '/perception/processed_pointcloud'
  output_detections: '/perception/detections'
