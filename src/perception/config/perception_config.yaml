# 感知系统配置文件

# 点云滤波配置
filtering:
  voxel_size: 0.01                    # 体素大小（米）
  statistical_nb_neighbors: 20        # 统计滤波邻域点数
  statistical_std_ratio: 2.0          # 统计滤波标准差倍数
  passthrough_axis: 'z'               # 直通滤波轴
  passthrough_min: 0.3                # 直通滤波最小值（米）
  passthrough_max: 2.0                # 直通滤波最大值（米）

# 密度计算配置
density:
  bandwidth: 0.05                     # KDE 带宽（米）
  kernel: 'gaussian'                  # 核函数类型
  use_inverse: true                   # 使用逆密度（增强稀疏区域）

# 3D 检测器配置
detector:
  type: 'density_fusion'              # 检测器类型：'standard' 或 'density_fusion'
  config_file: ''                     # MMDetection3D 配置文件路径（留空使用模拟检测器）
  checkpoint_file: ''                 # 模型权重文件路径
  device: 'cuda:0'                    # 设备：'cuda:0' 或 'cpu'
  score_threshold: 0.3                # 检测置信度阈值
  use_density_fusion: true            # 是否使用密度融合

# ROS2 话题配置
topics:
  depth_image: '/camera/aligned_depth_to_color/image_raw'
  camera_info: '/camera/color/camera_info'
  output_pointcloud: '/perception/processed_pointcloud'
  output_detections: '/perception/detections'
