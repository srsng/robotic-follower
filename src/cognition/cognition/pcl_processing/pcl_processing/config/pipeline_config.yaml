# 点云处理管道配置

# ===========================================
# 深度图像转点云配置
# ===========================================
depth_to_pointcloud:
  # 相机内参（RealSense D435 典型值）
  intrinsics:
    fx: 615.077    # 焦距 X
    fy: 615.848    # 焦距 Y
    cx: 329.281    # 主点 X
    cy: 237.672    # 主点 Y
    width: 640       # 图像宽度
    height: 480      # 图像高度

  # 深度参数
  depth_scale: 0.001      # 深度缩放因子
  invalid_depth: 0.0    # 无效深度值

# ===========================================
# 滤波器配置
# ===========================================
filters:
  # 体素滤波（下采样）
  voxel_filter:
    enabled: true
    leaf_size: 0.02          # 2cm 体素

  # 统计滤波（去噪）
  statistical_filter:
    enabled: true
    mean_k: 50               # 统计邻域大小
    std_dev_multiplier: 1.0    # 标准差倍数

  # 半径滤波
  radius_filter:
    enabled: false
    radius: 0.05             # 5cm 半径
    min_neighbors: 8           # 最小邻点数

  # 直通滤波（空间范围）
  passthrough_filter:
    enabled: true
    axis: "z"               # 滤波轴
    min: 0.0                 # 最小值
    max: 3.0                 # 最大值（3米）

# ===========================================
# 分割配置
# ===========================================
segmentation:
  # 平面分割（桌面检测）
  plane_segmentation:
    enabled: true
    distance_threshold: 0.02      # 2cm 距离阈值
    min_inliers: 1000             # 最小内点数
    max_iterations: 1000           # 最大迭代次数
    probability: 0.99              # RANSAC 概率

  # 欧几里德聚类（物体分割）
  euclidean_clustering:
    enabled: true
    cluster_tolerance: 0.05       # 5cm 聚类容差
    min_cluster_size: 100           # 最小聚类点数
    max_cluster_size: 25000       # 最大聚类点数

# ===========================================
# 深度计算配置
# ===========================================
density_calculation:
  enabled: true
  kernel_type: "gaussian"      # 高斯核
  bandwidth: 0.5                # 核带宽
  k_neighbors: 50                # 加速计算的K近邻
  normalization: "minmax"         # 归一化方式: minmax, zscore, none

# ===========================================
# 3D检测配置
# ===========================================
detection_3d:
  enabled: false    # 启用深度学习检测（需要训练好的模型）

  # 模型路径
  model_path: "models/density_fusion_3dnet.pth"

  # 推理参数
  num_proposals: 256            # 最大提议数
  confidence_threshold: 0.5     # 置信度阈值

  # 预计算密度
  precompute_density: true
