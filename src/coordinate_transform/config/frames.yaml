# 坐标变换配置文件

# 坐标系名称
frames:
  world: "world"
  base_link: "base_link"
  link6: "link6_1_1"
  tool_frame: "tool_frame"
  gripper_frame: "gripper_frame"

  # D435 相机坐标系
  d435_link: "d435_link"
  d435_color_optical: "d435_color_optical_frame"
  d435_depth_optical: "d435_depth_optical_frame"
  d435_points: "d435_points"

# TF 变换超时配置
timeouts:
  default: 1.0
  long: 5.0
  short: 0.1

# 机械臂工作空间
workspace:
  x: [-0.8, 0.8]
  y: [-0.8, 0.8]
  z: [0.0, 1.5]

# 工具坐标系偏移
tool_offset:
  x: 0.0
  y: 0.0
  z: 0.1
